version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: opentown
      POSTGRES_USER: opentown
      POSTGRES_PASSWORD: opentown
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - postgres
    environment:
      OPENTOWN_DATABASE_URL: postgresql+psycopg2://opentown:opentown@postgres:5432/opentown
      OPENTOWN_SECRET_KEY: please-change
      OPENTOWN_TICK_INTERVAL_MS: 500
      OPENTOWN_EVENT_PERSIST_EVERY_N_TICKS: 10
      OPENTOWN_SCORE_PERSIST_EVERY_N_TICKS: 5
      OPENTOWN_WORLD_EVENT_RETENTION_DAYS: 7
      OPENTOWN_WORLD_EVENT_CLEANUP_EVERY_N_TICKS: 1200
      OPENTOWN_WORLD_WIDTH: 140
      OPENTOWN_WORLD_HEIGHT: 100
    ports:
      - "8080:8080"

volumes:
  pgdata:
